<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css'
rel='stylesheet'> <!--Link da biblioteca dos ícones do login-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

    <title>Login ADM</title>
</head>


<body>
    <main class="container">
        <form id = "loginForm">
            <h1>Login ADM</h1>
            <div class="inputBox">
                <input placeholder="Email" type="email" id="loginEmail" required>
                <i class="bx bxs-user"></i>
            </div>

            <div class="inputBox">
                <input placeholder="Senha" type="password" id="loginSenha" required>
                <i class="bx bxs-lock-alt"></i>
            </div>

            <div class="lembrarSenha">
                <label>
                    <input type="checkbox">
                    Lembrar senha 
                </label>
            </div>

            <div id="mensagemErro" style="color: red; font-weight: bold;"></div>

            <button type="submit" class="login">Login</button>
        </form>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/api.js"></script>
    <script src="js/login.js"></script>

</body>


</html>
